version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/" # location of build.gradle
    schedule:
      interval: "daily" # or "weekly", "monthly"
    # Hold new releases for 14 days before proposing them, so freshly
    # compromised upstream versions are flagged before they reach a PR
    cooldown:
      default-days: 14
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/" # location of your workflow files
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
