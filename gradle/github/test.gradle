tasks.named('test') {
  useJUnitPlatform {
  }
  systemProperty 'API_SPEC_VERSION', project.version
  failFast = true
  // Mockito must be added as an agent, see:
  // https://javadoc.io/doc/org.mockito/mockito-core/latest/org.mockito/org/mockito/Mockito.html#0.3
  jvmArgs += [
    "-javaagent:${configurations.testRuntimeClasspath.find { it.name.contains('mockito-core') }}", '-Xshare:off'
  ]
  // DRL6Lexer is ANTLR-generated bytecode that JaCoCo cannot instrument
  jacoco {
    excludes = ['org/drools/**']
  }
  testLogging {
    events "passed", "skipped", "failed"
    exceptionFormat = 'full'
    showStandardStreams = true
  }
  reports {
    junitXml.required.set(true)
    html.required.set(true)
  }
}

tasks.named('jacocoTestReport') {
  dependsOn tasks.named('test')
  executionData fileTree(
    dir: layout.buildDirectory.dir("jacoco").get().asFile,
    include: ["*.exec"]
  )
  reports {
    xml.required.set(true)
    csv.required.set(false)
    html.required.set(true)
  }
}

// Coverage ratchet: locks in current business-logic coverage so a PR cannot silently drop it.
// Bootstrap/config/entity classes (no meaningful branching) are excluded so the gate reflects
// logic coverage. Thresholds sit a few points below the current level to leave headroom; raise
// them as coverage improves.
tasks.named('jacocoTestCoverageVerification') {
  dependsOn tasks.named('test')
  executionData fileTree(
    dir: layout.buildDirectory.dir("jacoco").get().asFile,
    include: ["*.exec"]
  )
  classDirectories.setFrom(
    files(sourceSets.main.output.collect {
      fileTree(dir: it, exclude: [
        'uk/gov/hmcts/cp/Application.class',
        'uk/gov/hmcts/cp/config/**',
        'uk/gov/hmcts/cp/entity/**'
      ])
    })
  )
  violationRules {
    rule {
      limit {
        counter = 'LINE'
        value = 'COVEREDRATIO'
        minimum = 0.88
      }
      limit {
        counter = 'BRANCH'
        value = 'COVEREDRATIO'
        minimum = 0.85
      }
    }
  }
}

// Make the gate part of `check` (and therefore `build`).
tasks.named('check') {
  dependsOn tasks.named('jacocoTestCoverageVerification')
}
