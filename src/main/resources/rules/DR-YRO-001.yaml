rule:
  id: "DR-YRO-001"
  title: "Youth Rehabilitation Order End Date Validation"
  description: >-
    Validates that a Youth Rehabilitation Order's end date is not earlier
    than the end date of any attached curfew requirement (AC2: YRC2, YRC1, YRC3), and that a
    YRC2/YRC1 requirement's own recorded end date matches its calculated duration (DD-42850:
    Start date + period - 1 day).
  priority: 5000
  enabled: false

  preprocessing:
    type: "youth-rehabilitation-order"
    yroOrderShortCodes:
      - YROEW
      - YRONI
      - YROFEW
      - YROISS
      - YROINI
    curfewShortCodes:
      - YRC2
    curfewTagShortCodes:
      - YRC1
    furtherCurfewShortCodes:
      - YRC3

  conditions:
    - id: "AC2a"
      name: "Curfew requirement exceeds YRO end date"
      expression: "curViolationCount > 0"
      severity: ERROR
      messageTemplate: >-
        The end date of the order must match or be longer than the end date of
        Youth Rehabilitation Requirement: Curfew
      errorMessageTemplate: >-
        The end date of the order must match or be longer than the end date of
        Youth Rehabilitation Requirement: Curfew. This affects ${defendantNames}.
      affectedOffenceSet: "curViolationOffenceIds"

    - id: "AC2b"
      name: "Curfew with electronic monitoring requirement exceeds YRO end date"
      expression: "cureViolationCount > 0"
      severity: ERROR
      messageTemplate: >-
        The end date of the order must match or be longer than the end date of
        Youth Rehabilitation Requirement: Curfew with electronic monitoring
      errorMessageTemplate: >-
        The end date of the order must match or be longer than the end date of
        Youth Rehabilitation Requirement: Curfew with electronic monitoring. This affects ${defendantNames}.
      affectedOffenceSet: "cureViolationOffenceIds"

    - id: "AC2c"
      name: "Further curfew requirement exceeds YRO end date"
      expression: "curaViolationCount > 0"
      severity: ERROR
      messageTemplate: >-
        The end date of the order must match or be longer than the end date of
        Youth Rehabilitation Requirement: Further curfew requirement made
      errorMessageTemplate: >-
        The end date of the order must match or be longer than the end date of
        Youth Rehabilitation Requirement: Further curfew requirement made. This affects ${defendantNames}.
      affectedOffenceSet: "curaViolationOffenceIds"

    - id: "DUR-YRC2"
      name: "Curfew requirement end date does not match calculated duration"
      expression: "curDurationMismatchCount > 0"
      severity: ERROR
      messageTemplate: >-
        The end date for the Curfew Requirement does not match the period of the requirement.
        The current recorded period would mean the end date should be ${calculatedEndDate}.
      errorMessageTemplate: >-
        The end date for the Curfew Requirement does not match the period of the requirement.
        This affects ${defendantNames}.
      affectedOffenceSet: "curDurationMismatchOffenceIds"
      calculatedValueSet: "curCalculatedEndDateByOffenceId"
      validationLevel: OFFENCE

    - id: "DUR-YRC1"
      name: "Curfew with electronic monitoring end date of tagging does not match calculated duration"
      expression: "cureDurationMismatchCount > 0"
      severity: ERROR
      messageTemplate: >-
        The end date for the Curfew Requirement does not match the period of the requirement.
        The current recorded period would mean the end date should be ${calculatedEndDate}.
      errorMessageTemplate: >-
        The end date for the Curfew Requirement does not match the period of the requirement.
        This affects ${defendantNames}.
      affectedOffenceSet: "cureDurationMismatchOffenceIds"
      calculatedValueSet: "cureCalculatedEndDateByOffenceId"
      validationLevel: OFFENCE
