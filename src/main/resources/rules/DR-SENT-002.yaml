rule:
  id: "DR-SENT-002"
  title: "Custodial sentence concurrent/consecutive check"
  description: >-
    Validates that custodial sentences have correct concurrent/consecutive
    information per defendant across all cases in a hearing.
  priority: 1000
  enabled: true

  preprocessing:
    type: "custodial-concurrent-consecutive"
    filterShortCodes:
      - IMP
      - DTO
      - YOI
      - extdvs
      - extdvsu
      - extivs
      - STSDY
      - specc
      - speccc
      - speccd
    groupBy: "defendant-then-offence"
    skipWhenGroupCount: 1

  conditions:
    - id: "AC3"
      name: "Both concurrent and consecutive"
      expression: "hasBothCount > 0"
      severity: WARNING
      messageTemplate: >-
        Offence/counts ${offenceNumbers} show they are both concurrent
        and consecutive. Please confirm this is correct before sharing
      affectedOffenceSet: "hasBothOffenceIds"

    - id: "AC2"
      name: "Multiple offences missing info"
      expression: "noInfoCount > 1"
      severity: ERROR
      messageTemplate: >-
        Offence/counts ${offenceNumbers} do not include details of whether
        they are concurrent or consecutive. There should be only one primary
        sentence and one result without concurrent or consecutive information
      affectedOffenceSet: "noInfoOffenceIds"

    - id: "AC4"
      name: "No primary sentence"
      expression: "noInfoCount == 0 && hasPrimaryCount == 0"
      severity: WARNING
      messageTemplate: >-
        All offences include details of them being concurrent or consecutive
        and there seems to be no primary sentence. Please check that this
        is correct before sharing
      affectedOffenceSet: "allOffenceIds"
