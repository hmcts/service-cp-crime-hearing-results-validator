spring:
  application:
    name: service-cp-crime-hearing-results-validator
  config:
    import:
      - optional:classpath:application-artemis-jms.yaml
  datasource:
    url: ${APP_NAME_DATASOURCE_URL:jdbc:postgresql://localhost:5433/results-validator-db}
    username: ${APP_NAME_DATASOURCE_USERNAME:cpp_user}
    password: ${APP_NAME_DATASOURCE_PASSWORD:password123}
  jpa:
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:4550}
  shutdown: graceful
  http2:
    enabled: true
  forward-headers-strategy: framework   # honor X-Forwarded-* behind proxies
  compression:
    enabled: true
    min-response-size: 2KB
    mime-types: "application/json"

management:
  server:
    # Keep actuator on same port by default; override if you want a separate port
    port: ${MANAGEMENT_SERVER_PORT:${SERVER_PORT:4550}}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true                  # liveness/readiness groups
  health:
    jms:
      enabled: ${JMS_HEALTH_ENABLED:false}
  metrics:
    tags:
      service: service-cp-crime-hearing-results-validator
      cluster: ${CLUSTER_NAME:local}
      region: ${REGION:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLER_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_TRACES_URL:http://localhost:4318/traces}
    metrics:
      export:
        enabled: ${OTEL_METRICS_ENABLED:false}
        url: ${OTEL_METRICS_URL:http://localhost:4318/metrics}

azure:
  application-insights:
    instrumentation-key: ${rpe.AppInsightsInstrumentationKey:00000000-0000-0000-0000-000000000000}

authz:
  http:
    enabled: ${AUTHZ_ENABLED:true}
    identity-url-template: ${CP_BASE_URL:http://localhost:8080}/usersgroups-query-api/query/api/rest/usersgroups/users/logged-in-user/permissions
    user-id-header: "CJSCPPUID"
    action-header: "CPP-ACTION"
    accept-header: "application/vnd.usersgroups.get-logged-in-user-permissions+json"
    drools-classpath-pattern: "classpath:/acl/**/*.drl"
    reload-on-each-request: ${AUTHZ_RELOAD_RULES:false}
    action-required: false
    deny-when-no-rules: true
    exclude-path-prefixes:
      - "/actuator"
      - "/error"

validation:
  cache:
    override-ttl-seconds: ${RULE_OVERRIDE_CACHE_TTL:30}

feature:
  connection-string: ${FEATURE_MANAGER_CONNECTION_STRING:}
  label: ${FEATURE_LABEL:}
  cache:
    ttl-seconds: ${FEATURE_CACHE_TTL_SECONDS:600}

logging:
  level:
    root: INFO
  # Use your JSON config (async) — make sure this file exists
  config: classpath:logback.xml