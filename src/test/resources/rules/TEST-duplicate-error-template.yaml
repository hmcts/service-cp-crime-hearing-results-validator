rule:
  id: "DR-TEST-DUPLICATE-ERRTEMPLATE-001"
  title: "Invalid rule with two errorMessageTemplates"
  priority: 9999
  enabled: true

  preprocessing:
    type: "custodial-concurrent-consecutive"
    filterShortCodes:
      - IMP
    groupBy: "defendant-then-offence"
    skipWhenGroupCount: 1

  conditions:
    - id: "AC1"
      name: "First condition with errorMessageTemplate"
      expression: "hasBothCount > 0"
      severity: ERROR
      messageTemplate: "Offence ${offenceNumber} has a conflict"
      errorMessageTemplate: "Conflicting sentences affect ${defendantNames}."
      affectedOffenceSet: "offenceIds"
      affectedDefendantSet: "defendantId"
      validationLevel: OFFENCE
    - id: "AC2"
      name: "Second condition with errorMessageTemplate"
      expression: "noInfoCount > 0"
      severity: ERROR
      messageTemplate: "Offence ${offenceNumber} is missing info"
      errorMessageTemplate: "Missing info affects ${defendantNames}."
      affectedOffenceSet: "offenceIds"
      affectedDefendantSet: "defendantId"
      validationLevel: OFFENCE
