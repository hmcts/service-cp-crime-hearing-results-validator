gatling {
  core {
    encoding = "utf-8"
    shutdownTimeout = 5000
    elFileBodiesCacheMaxCapacity = 200
  }
  http {
    fetchedCssCacheMaxCapacity = 0
    fetchedHtmlCacheMaxCapacity = 0
    warmUpUrl = ""
    pooledConnectionIdleTimeout = 60000
    requestTimeout = 30000
  }
  data {
    writers = [console, file]
    console {
      light = false
      writePeriod = 5
    }
  }
}
